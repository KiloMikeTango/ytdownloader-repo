name: Build and Deploy

on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Index Package
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          mkdir -p build/dists/stable/main/binary-all
          dpkg-deb --build package build/dists/stable/main/binary-all/ytdownloader_1.0.0_all.deb
          cd build/dists/stable/main
          dpkg-scanpackages binary-all/ > Packages
          gzip -c Packages > binary-all/Packages.gz
          cd ../..
          echo "Origin: ytdownloader-repo" > Release
          echo "Label: ytdownloader" >> Release
          echo "Suite: stable" >> Release
          echo "Codename: stable" >> Release
          echo "Architectures: all" >> Release
          echo "Components: main" >> Release
          echo "Description: YtDownloader Repository" >> Release
          cd ../../..
          cp install.sh build/install.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
